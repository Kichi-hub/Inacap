<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculadora de promedio</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <div class="contenedor">
        <h1>Calculadora de promedio</h1>
        <p>Ingresa tres notas (escala 1.0 - 7.0)</p>
        <!--Nota 1-->
        <label for="nota1">Nota 1:</label>
        <input type="number" id="nota1" min="1" max="7" step="0.1">

        <label for="porc1">Porcentaje 1 (%):</label>
        <input type="number" id="porc1" min="0" max="100" step="0.1">

        <!--Nota 2-->
        <label for="nota2">Nota 2:</label>
        <input type="number" id="nota2" min="1" max="7" step="0.1">

        <label for="porc2">Porcentaje 2 (%):</label>
        <input type="number" id="porc2" min="0" max="100" step="0.1">

        <!--Nota 3-->
        <label for="nota3">Nota 3:</label>
        <input type="number" id="nota3" min="1" max="7" step="0.1">

        <label for="porc3">Porcentaje 3 (%):</label>
        <input type="number" id="porc3" min="0" max="100" step="0.1">

        <!--Nota 4-->
        <label for="nota4">Nota 4:</label>
        <input type="number" id="nota4" min="1" max="7" step="0.1">

        <label for="porc4">Porcentaje 4 (%):</label>
        <input type="number" id="porc4" min="0" max="100" step="0.1">

        <button id="btnCalcular">Calcular promedio</button>

        <div id="resultado">Resultado</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
